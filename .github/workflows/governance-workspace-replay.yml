name: governance-workspace-replay

on:
  schedule:
    # 10:30 Asia/Shanghai (02:30 UTC) daily
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: governance-workspace-replay
  cancel-in-progress: false

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run workspace replay validation (nightly)
        run: |
          python3 tools/validation/validate_scheduler_workspace_replay_v0_1.py
