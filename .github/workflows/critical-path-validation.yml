name: critical-path-validation

on:
  push:
    branches: ["main"]
    paths:
      - "schemas/**"
      - "docs/**"
      - "data/fixtures/**"
      - "core/**"
      - "tools/**"
      - "test/**"
      - ".github/workflows/critical-path-validation.yml"
  pull_request:
    paths:
      - "schemas/**"
      - "docs/**"
      - "data/fixtures/**"
      - "core/**"
      - "tools/**"
      - "test/**"
      - ".github/workflows/critical-path-validation.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run critical-path scenario validation
        run: |
          python3 tools/validation/validate_scenarios_v0_1.py

      - name: Run memory-index validation
        run: |
          python3 tools/validation/validate_memory_index_v0_1.py

      - name: Run opinion conflict clustering validation
        run: |
          python3 tools/validation/validate_opinion_conflicts_v0_1.py

      - name: Run recall quality baseline validation
        run: |
          python3 tools/validation/validate_recall_quality_v0_1.py

      - name: Run memory import replay validation
        run: |
          python3 tools/validation/validate_memory_import_v0_1.py

      - name: Run reflect scheduler worker validation
        run: |
          python3 tools/validation/validate_scheduler_worker_v0_1.py

      - name: Run scheduler multi-worker lock validation
        run: |
          python3 tools/validation/validate_scheduler_multi_worker_lock_v0_1.py

      - name: Run temporal governance worker validation
        run: |
          python3 tools/validation/validate_temporal_governance_worker_v0_1.py

      - name: Run scheduler lease renew validation
        run: |
          python3 tools/validation/validate_scheduler_lease_renew_v0_1.py

      - name: Run temporal verify/revalidate validation
        run: |
          python3 tools/validation/validate_temporal_verify_revalidate_v0_1.py

      - name: Run weekly governance report validation
        run: |
          python3 tools/validation/validate_weekly_governance_report_v0_1.py

      - name: Run scheduler benchmark validation
        run: |
          python3 tools/validation/validate_scheduler_benchmark_v0_1.py

      - name: Run vector readiness validation
        run: |
          python3 tools/validation/validate_vector_readiness_v0_1.py

      - name: Run apply compensation validation
        run: |
          python3 tools/validation/validate_apply_compensation_v0_1.py

      - name: Run ingest tooling validation
        run: |
          python3 tools/validation/validate_ingest_tools_v0_1.py

      - name: Run llm memory processor validation (mock)
        run: |
          python3 tools/validation/validate_llm_memory_processor_v0_1.py
